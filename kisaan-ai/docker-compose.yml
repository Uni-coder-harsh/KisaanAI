services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: kisaan_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Feature Store) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kisaan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── MLflow Tracking Server ────────────────────────────────────
  mlflow:
    build:
      context: ./docker
      dockerfile: Dockerfile.mlflow
    container_name: kisaan_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # ── FastAPI Inference API ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kisaan_api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    env_file:
      - .env
    volumes:
      # Mount all code folders — changes reflect instantly, no rebuild needed
      - ./inference_api:/app/inference_api
      - ./ml_models:/app/ml_models
      - ./rag_engine:/app/rag_engine
      - ./data_pipeline:/app/data_pipeline
    depends_on:
      - postgres
      - redis
      - mlflow
    command: uvicorn inference_api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Data Pipeline (Prefect) ───────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: kisaan_pipeline
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    env_file:
      - .env
    volumes:
      - ./data_pipeline:/app/data_pipeline
    depends_on:
      - postgres
      - redis
    command: python data_pipeline/scheduler.py

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kisaan_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kisaan_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
